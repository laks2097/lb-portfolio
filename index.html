<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lakshay Bhalla - Portfolio</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            background: '#020617',
            primary: '#06b6d4', // cyan-500
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@300;400;500;700;800&display=swap"
    rel="stylesheet">

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #a1a1aa;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Outfit', sans-serif;
    }

    /* Ethereal Ambient Glow Animations */
    @keyframes slowPan {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(5%, 5%) scale(1.05);
      }

      100% {
        transform: translate(0, 0) scale(1);
      }
    }

    .ambient-orb {
      animation: slowPan 15s ease-in-out infinite alternate;
    }

    /* Hover parent group logic for Experience generic fade */
    .experience-list:hover .experience-item {
      opacity: 0.3;
    }

    .experience-list .experience-item:hover {
      opacity: 1;
      transform: translateX(10px);
    }
  </style>
</head>

<body class="bg-[#020617] text-zinc-400 selection:bg-cyan-500/30 selection:text-cyan-200 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icons ---
    const IconWrapper = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );

    const Mail = (props) => <IconWrapper {...props}><rect width="20" height="16" x="2" y="4" rx="2" /><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" /></IconWrapper>;
    const Linkedin = (props) => <IconWrapper {...props}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" /><rect width="4" height="12" x="2" y="9" /><circle cx="4" cy="4" r="2" /></IconWrapper>;
    const ArrowRight = (props) => <IconWrapper {...props}><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></IconWrapper>;
    const DownloadCloud = (props) => <IconWrapper {...props}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" /><path d="M12 12v9" /><path d="m8 17 4 4 4-4" /></IconWrapper>;
    const FileText = (props) => <IconWrapper {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></IconWrapper>;

    // --- Interactive Background Component ---
    const InteractiveBackground = () => {
      const canvasRef = useRef(null);
      const glowRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const glow = glowRef.current;
        let animationFrameId;
        let particles = [];

        let mouse = { x: -1000, y: -1000 };

        const handleMouseMove = (e) => {
          mouse.x = e.clientX;
          mouse.y = e.clientY;
          if (glow) {
            glow.style.transform = `translate(${e.clientX - 400}px, ${e.clientY - 400}px)`;
          }
        };

        const handleMouseLeave = () => {
          mouse.x = -1000;
          mouse.y = -1000;
        };

        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseout', handleMouseLeave);

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          initParticles();
        };

        class Particle {
          constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.6;
            this.vy = (Math.random() - 0.5) * 0.6;
            this.radius = Math.random() * 1.5 + 0.5;
          }
          update() {
            this.x += this.vx;
            this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx = -this.vx;
            if (this.y < 0 || this.y > canvas.height) this.vy = -this.vy;
          }
          draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(6, 182, 212, 0.6)'; // cyan
            ctx.fill();
          }
        }

        const initParticles = () => {
          particles = [];
          const numParticles = Math.floor((canvas.width * canvas.height) / 15000);
          for (let i = 0; i < numParticles; i++) {
            particles.push(new Particle());
          }
        };

        const animate = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          particles.forEach(p => {
            p.update();
            p.draw();
          });

          for (let i = 0; i < particles.length; i++) {
            // Connect to mouse
            const dxMouse = particles[i].x - mouse.x;
            const dyMouse = particles[i].y - mouse.y;
            const distMouse = dxMouse * dxMouse + dyMouse * dyMouse;

            if (distMouse < 30000) {
              ctx.beginPath();
              ctx.strokeStyle = `rgba(6, 182, 212, ${0.3 - distMouse / 100000})`; // cyan
              ctx.lineWidth = 1;
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(mouse.x, mouse.y);
              ctx.stroke();

              // Push effect
              particles[i].x += dxMouse * 0.01;
              particles[i].y += dyMouse * 0.01;
            }

            // Connect to other particles
            for (let j = i + 1; j < particles.length; j++) {
              const dx = particles[i].x - particles[j].x;
              const dy = particles[i].y - particles[j].y;
              const distance = dx * dx + dy * dy;
              if (distance < 18000) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(139, 92, 246, ${0.15 - distance / 120000})`; // violet
                ctx.lineWidth = 0.8;
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
              }
            }
          }
          animationFrameId = requestAnimationFrame(animate);
        };

        window.addEventListener('resize', resize);
        resize();
        animate();

        if (glow) glow.style.transform = `translate(-1000px, -1000px)`;

        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseout', handleMouseLeave);
          window.removeEventListener('resize', resize);
          cancelAnimationFrame(animationFrameId);
        };
      }, []);

      return (
        <div className="fixed inset-0 overflow-hidden pointer-events-none -z-10">
          <div
            ref={glowRef}
            className="absolute top-0 left-0 w-[800px] h-[800px] bg-cyan-500/15 rounded-full blur-[100px] mix-blend-screen transition-transform duration-75 ease-out z-0 will-change-transform"
          ></div>
          <div className="ambient-orb absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-cyan-600/10 blur-[100px] mix-blend-screen opacity-50"></div>
          <div className="ambient-orb absolute bottom-0 right-[-10%] w-[60vw] h-[60vw] rounded-full bg-violet-600/10 blur-[120px] mix-blend-screen opacity-50" style={{ animationDelay: '-5s' }}></div>
          <canvas ref={canvasRef} className="absolute inset-0 w-full h-full z-10 opacity-80"></canvas>
        </div>
      );
    };

    // --- Components ---
    const NavBar = ({ email, linkedin, isScrolled }) => (
      <nav className={`fixed top-0 w-full z-50 transition-all duration-500 ease-in-out ${isScrolled ? 'py-4 bg-[#020617]/80 backdrop-blur-md border-b border-white/5' : 'py-8 mix-blend-difference'}`} data-aos="fade-down" data-aos-duration="1000">
        <div className="max-w-6xl mx-auto px-6 flex justify-between items-center">
          <div className="font-display font-bold text-xl tracking-tight text-white cursor-default">
            L<span className="text-cyan-400">.</span>B
          </div>
          <div className="flex gap-6 items-center">
            <a href={linkedin} target="_blank" rel="noreferrer" className="text-zinc-400 hover:text-white transition-colors" aria-label="LinkedIn">
              <Linkedin size={20} />
            </a>
            <a href={`mailto:${email}`} className="text-zinc-400 hover:text-white transition-colors" aria-label="Email">
              <Mail size={20} />
            </a>
          </div>
        </div>
      </nav>
    );

    function App() {
      const [resumeData, setResumeData] = useState(null);
      const [isScrolled, setIsScrolled] = useState(false);

      useEffect(() => {
        fetch('./resume.json')
          .then(response => response.json())
          .then(data => setResumeData(data))
          .catch(error => console.error('Error loading resume data:', error));

        const handleScroll = () => {
          setIsScrolled(window.scrollY > 50);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        if (resumeData) {
          setTimeout(() => {
            AOS.init({
              once: true,
              offset: 50,
              duration: 1200,
              easing: 'ease-out-cubic'
            });
            AOS.refresh();
          }, 100);
        }
      }, [resumeData]);

      if (!resumeData) {
        return (
          <div className="min-h-screen bg-[#020617] flex items-center justify-center">
            <div className="w-8 h-8 border-2 border-white/10 border-t-white rounded-full animate-spin"></div>
          </div>
        );
      }

      return (
        <div className="min-h-screen relative">
          <InteractiveBackground />
          <NavBar email={resumeData.email} linkedin={resumeData.linkedin} isScrolled={isScrolled} />

          <main className="max-w-5xl mx-auto px-6 pt-40 pb-24 space-y-48">

            {/* HERO SECTION */}
            <section className="min-h-[60vh] flex flex-col justify-center items-start lg:items-center lg:text-center relative z-10 w-full">

              <h1 className="text-6xl md:text-8xl lg:text-[10rem] font-display font-extrabold text-white leading-[0.9] tracking-tighter mb-8" data-aos="fade-up">
                <span className="block opacity-90">Building</span>
                <span className="block text-transparent bg-clip-text bg-gradient-to-r from-zinc-100 via-zinc-400 to-zinc-600">Excellence.</span>
              </h1>

              <div className="flex flex-col lg:flex-row items-center lg:items-center gap-8 lg:gap-12 mt-12 mb-8" data-aos="fade-up" data-aos-delay="100">
                <div className="relative rounded-full p-2 bg-gradient-to-br from-zinc-800 to-zinc-900 w-48 h-48 lg:w-56 lg:h-56 shrink-0 shadow-2xl">
                  {/* Subtle backglow */}
                  <div className="absolute inset-0 rounded-full bg-cyan-500/10 blur-2xl -z-10"></div>
                  <img
                    src={resumeData.image}
                    alt={resumeData.name}
                    className="w-full h-full object-cover rounded-full border border-white/10 shadow-inner"
                    onError={(e) => { e.target.src = `https://ui-avatars.com/api/?name=${resumeData.name}&background=18181b&color=fff&size=256`; }}
                  />
                </div>

                <p className="text-2xl md:text-3xl font-display font-light text-zinc-400 max-w-xl leading-snug text-center lg:text-left">
                  I'm <span className="text-white font-medium">{resumeData.name}</span>, a <span className="text-white">{resumeData.role}</span> specializing in engineering scalable architectures.
                </p>
              </div>

              <div className="mt-16 flex flex-wrap items-center gap-6" data-aos="fade-up" data-aos-delay="200">
                <a href="./resume.html" target="_blank" rel="noopener noreferrer" className="group flex items-center gap-3 px-8 py-4 rounded-full bg-white text-black font-semibold hover:bg-zinc-200 hover:scale-105 transition-all duration-300">
                  <FileText size={18} className="group-hover:-translate-y-1 transition-transform" />
                  <span>View Resume</span>
                </a>
                <div className="flex items-center gap-3 text-sm font-medium text-emerald-400 px-6 py-4 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                  <span className="relative flex h-2 w-2">
                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                  </span>
                  Available for Work
                </div>
              </div>
            </section>

            {/* EDITORIAL ABOUT */}
            <section className="relative z-10 w-full" id="about">
              <div className="flex items-center gap-4 mb-10" data-aos="fade-right">
                <span className="text-sm font-bold tracking-widest text-cyan-500 uppercase">01. About</span>
                <div className="flex-1 h-px bg-gradient-to-r from-cyan-500/20 to-transparent"></div>
              </div>

              <div className="max-w-4xl" data-aos="fade-up">
                <p className="text-3xl md:text-5xl lg:text-6xl font-display font-light leading-[1.2] text-zinc-500">
                  <span className="text-white font-medium">With a relentless pursuit of technical excellence,</span> {resumeData.summary}
                </p>
              </div>

              <div className="mt-24 grid grid-cols-1 md:grid-cols-2 gap-16 lg:gap-24" data-aos="fade-up" data-aos-delay="100">
                <div>
                  <h3 className="text-xs font-bold tracking-widest text-zinc-600 uppercase mb-8">Key Achievements</h3>
                  <ul className="space-y-6">
                    {resumeData.certifications.slice(0, 4).map((cert, i) => (
                      <li key={i} className="flex gap-4 items-start text-zinc-300 group">
                        <span className="text-cyan-500 mt-1"><ArrowRight size={16} /></span>
                        <span className="group-hover:text-white transition-colors text-lg">{cert}</span>
                      </li>
                    ))}
                  </ul>
                </div>
                <div>
                  <h3 className="text-xs font-bold tracking-widest text-zinc-600 uppercase mb-8">Education</h3>
                  <div className="text-zinc-300 group">
                    <p className="text-white font-display text-2xl mb-2">{resumeData.education[0].school}</p>
                    <p className="text-lg text-zinc-400">{resumeData.education[0].degree}</p>
                    <p className="text-sm tracking-widest text-zinc-600 mt-4 uppercase font-semibold">{resumeData.education[0].period}</p>
                  </div>
                </div>
              </div>
            </section>

            {/* FLOWING EXPERIENCE */}
            <section className="relative z-10 w-full" id="experience">
              <div className="flex items-center gap-4 mb-16" data-aos="fade-right">
                <span className="text-sm font-bold tracking-widest text-violet-500 uppercase">02. Experience</span>
                <div className="flex-1 h-px bg-gradient-to-r from-violet-500/20 to-transparent"></div>
              </div>

              <div className="experience-list flex flex-col w-full border-t border-white/5">
                {resumeData.experience.map((exp, index) => (
                  <div key={index} className="experience-item flex flex-col lg:flex-row justify-between items-start lg:items-center py-12 lg:py-16 border-b border-white/5 transition-all duration-500 cursor-default group" data-aos="fade-up" data-aos-offset="50">

                    <div className="flex-1 lg:pr-12 w-full">
                      <h3 className="text-3xl md:text-5xl font-display font-medium text-white mb-4 tracking-tight group-hover:text-cyan-400 transition-colors">{exp.role}</h3>
                      <div className="text-xl md:text-2xl text-zinc-400 font-display flex flex-wrap items-center gap-3">
                        <span className="text-white/80">{exp.company}</span>
                        <span className="w-1.5 h-1.5 rounded-full bg-cyan-500/50"></span>
                        <span className="text-zinc-500">{exp.location}</span>
                      </div>
                    </div>

                    <div className="flex-none mt-8 lg:mt-0 w-full lg:w-[400px]">
                      <span className="inline-block px-4 py-2 rounded-full border border-white/10 text-zinc-400 text-sm tracking-wide mb-6">
                        {exp.period}
                      </span>
                      <p className="text-zinc-400 text-base md:text-lg leading-relaxed">
                        {exp.desc}
                      </p>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* ORGANIC SKILLS TAGS */}
            <section className="relative z-10" id="skills">
              <div className="flex items-center gap-4 mb-16" data-aos="fade-right">
                <span className="text-sm font-bold tracking-widest text-emerald-500 uppercase">03. Capabilities</span>
                <div className="flex-1 h-px bg-gradient-to-r from-emerald-500/20 to-transparent"></div>
              </div>

              <div className="space-y-20">
                {resumeData.skills.map((skillGroup, idx) => (
                  <div key={idx} data-aos="fade-up" data-aos-delay={idx * 50}>
                    <h3 className="text-xl md:text-2xl font-display text-white mb-8 pl-6 border-l-2 border-cyan-500/50">{skillGroup.category}</h3>
                    <div className="flex flex-wrap gap-4 pl-6">
                      {skillGroup.items.map((skill, i) => (
                        <span key={i} className="px-6 py-3 text-lg md:text-xl font-display text-zinc-300 rounded-full border border-white/5 hover:border-white/20 hover:text-white transition-all bg-white/[0.02] backdrop-blur-md cursor-default shadow-sm">
                          {skill}
                        </span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* FOOTER */}
            <footer className="relative z-10 pt-32 pb-12 border-t border-white/5 flex flex-col items-center justify-center text-center">
              <h2 className="text-5xl md:text-8xl font-display font-bold text-white mb-6" data-aos="fade-up">Let's connect.</h2>
              <p className="text-xl md:text-2xl text-zinc-500 mb-12 max-w-lg mx-auto" data-aos="fade-up" data-aos-delay="100">{resumeData.tagline}</p>
              <a href={`mailto:${resumeData.email}`} className="text-2xl md:text-4xl font-display text-white border-b-2 border-cyan-500/50 pb-2 hover:border-cyan-400 hover:text-cyan-400 transition-all" data-aos="fade-up" data-aos-delay="200">
                {resumeData.email}
              </a>

              <div className="mt-40 flex flex-col md:flex-row items-center justify-between w-full text-xs font-bold tracking-widest text-zinc-600 uppercase">
                <p>© {new Date().getFullYear()} Lakshay Bhalla.</p>
                <p className="mt-4 md:mt-0">Engineered for Excellence.</p>
              </div>
            </footer>

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
